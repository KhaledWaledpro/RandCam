<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RandCam - تواصل بلا حدود</title>
    
    <meta name="description" content="RandCam هو أفضل موقع للدردشة العشوائية ومحادثات الفيديو المباشرة. قابل أشخاصاً جدد وتواصل بالصوت والصورة بكل سهولة، مجاناً وبدون تسجيل.">
    <meta name="keywords" content="شات عشوائي, دردشة فيديو, أوميجل, تعارف عشوائي, فيديو شات, محادثة مباشرة, RandCam, random video chat">
    
    <style>
        :root {
            --primary-blue: #0056b3;
            --light-blue: #00d2ff;
            --bg-white: #f8fbff;
            --panel-bg: #ffffff;
            --text-dark: #333333;
            --shadow: 0 10px 30px rgba(0, 86, 179, 0.1);
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, var(--bg-white) 0%, #e0f0ff 100%);
            color: var(--text-dark);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            margin-top: 20px;
            text-align: center;
            animation: fadeInDown 0.8s ease-out;
        }

        h1 {
            font-size: 2.8rem;
            color: var(--primary-blue);
            margin: 0;
            text-shadow: 2px 2px 4px rgba(0, 210, 255, 0.3);
        }

        #status {
            color: #555;
            font-size: 1.1rem;
            margin-top: 5px;
            font-weight: bold;
            background: #e9f5ff;
            padding: 5px 25px;
            border-radius: 20px;
            display: inline-block;
            border: 1px solid var(--light-blue);
        }

        .main-container {
            display: flex;
            gap: 20px;
            margin-top: 30px;
            width: 95%;
            max-width: 1200px;
            animation: fadeIn 1s ease-in-out;
        }

        .video-section {
            flex: 2;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .video-wrapper {
            background: var(--panel-bg);
            padding: 10px;
            border-radius: 20px;
            box-shadow: var(--shadow);
            position: relative;
        }

        video {
            width: 100%;
            height: 320px;
            background-color: #000;
            border-radius: 15px;
            object-fit: cover;
        }

        .video-label {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.8);
            padding: 4px 12px;
            border-radius: 8px;
            font-weight: bold;
            color: var(--primary-blue);
            backdrop-filter: blur(4px);
        }

        .chat-section {
            flex: 1;
            background: var(--panel-bg);
            border-radius: 20px;
            box-shadow: var(--shadow);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: 1px solid rgba(0, 210, 255, 0.2);
        }

        .chat-header {
            background: linear-gradient(90deg, var(--primary-blue), var(--light-blue));
            color: white;
            padding: 15px;
            text-align: center;
            font-weight: bold;
        }

        .chat-messages {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
            height: 450px;
            background: #fbfdff;
        }

        .msg {
            max-width: 85%;
            padding: 8px 12px;
            border-radius: 12px;
            font-size: 0.95rem;
            animation: popIn 0.3s ease;
        }

        .msg.local { align-self: flex-start; background: var(--primary-blue); color: white; }
        .msg.remote { align-self: flex-end; background: #e9ecef; color: var(--text-dark); }

        .chat-input-area {
            display: flex;
            padding: 15px;
            border-top: 1px solid #eee;
        }

        #chatInput {
            flex: 1;
            padding: 10px 15px;
            border: 1px solid #ddd;
            border-radius: 20px;
            outline: none;
        }

        #sendBtn {
            background: var(--light-blue);
            color: white;
            border: none;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            margin-right: 10px;
            cursor: pointer;
        }

        .controls { margin: 25px 0; display: flex; gap: 15px; }

        .control-btn {
            padding: 12px 35px;
            font-size: 1rem;
            font-weight: bold;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: 0.3s;
        }

        #nextBtn { background: linear-gradient(90deg, var(--primary-blue), var(--light-blue)); color: white; }
        #stopBtn { background: white; color: #dc3545; border: 1px solid #dc3545; }

        @keyframes fadeInDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes popIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body>

    <header>
        <h1>RandCam</h1>
        <div id="status">جاري الاتصال...</div>
    </header>

    <div class="main-container">
        <div class="video-section">
            <div class="video-wrapper">
                <video id="remoteVideo" autoplay playsinline></video>
                <div class="video-label" style="color: var(--light-blue);">الشخص الغريب</div>
            </div>
            <div class="video-wrapper">
                <video id="localVideo" autoplay muted playsinline></video>
                <div class="video-label">أنت</div>
            </div>
        </div>

        <div class="chat-section">
            <div class="chat-header">دردشة مباشرة</div>
            <div class="chat-messages" id="chatMessages"></div>
            <div class="chat-input-area">
                <input type="text" id="chatInput" placeholder="اكتب هنا..." onkeypress="if(event.key==='Enter') sendMessage()">
                <button id="sendBtn" onclick="sendMessage()">➤</button>
            </div>
        </div>
    </div>

    <div class="controls">
        <button class="control-btn" id="nextBtn" onclick="location.reload()">تخطي ⏭️</button>
        <button class="control-btn" id="stopBtn" onclick="stopEverything()">إيقاف ⏹️</button>
    </div>

    <script>
        const localVideo = document.getElementById('localVideo');
        const remoteVideo = document.getElementById('remoteVideo');
        const statusText = document.getElementById('status');
        const chatMessages = document.getElementById('chatMessages');
        const chatInput = document.getElementById('chatInput');

        let localStream, peerConnection, iceCandidateQueue = [];

        const config = {
            'iceCandidatePoolSize': 10,
            'iceServers': [
                {'urls': 'stun:stun.cloudflare.com:3478'},
                {'urls': 'stun:stun.l.google.com:19302'},
                {'urls': 'turn:openrelay.metered.ca:80', 'username': 'openrelayproject', 'credential': 'openrelayproject'},
                {'urls': 'turn:openrelay.metered.ca:443', 'username': 'openrelayproject', 'credential': 'openrelayproject'}
            ]
        };

        const ws = new WebSocket("wss://khalidwalidabdelnaseer22-randcam.hf.space/ws");

        ws.onopen = () => {
            statusText.innerText = "متصل! نفتح الكاميرا...";
            startCamera();
        };

        async function startCamera() {
            try {
                localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                localVideo.srcObject = localStream;
            } catch (e) {
                statusText.innerText = "⚠️ افتح الكاميرا من فضلك";
            }
        }

        ws.onmessage = async (event) => {
            const data = JSON.parse(event.data);
            if (data.type === 'status') statusText.innerText = data.message;
            else if (data.type === 'chat') appendMessage(data.text, 'remote');
            else if (data.type === 'init_webrtc') {
                createPeerConnection();
                const offer = await peerConnection.createOffer();
                await peerConnection.setLocalDescription(offer);
                ws.send(JSON.stringify({ type: 'offer', offer: offer }));
            }
            else if (data.type === 'offer') {
                createPeerConnection();
                await peerConnection.setRemoteDescription(new RTCSessionDescription(data.offer));
                const answer = await peerConnection.createAnswer();
                await peerConnection.setLocalDescription(answer);
                ws.send(JSON.stringify({ type: 'answer', answer: answer }));
                processIceQueue();
            }
            else if (data.type === 'answer') {
                await peerConnection.setRemoteDescription(new RTCSessionDescription(data.answer));
                processIceQueue();
            }
            else if (data.type === 'ice-candidate') {
                if (peerConnection && peerConnection.remoteDescription) {
                    await peerConnection.addIceCandidate(new RTCIceCandidate(data.candidate));
                } else {
                    iceCandidateQueue.push(data.candidate);
                }
            }
            else if (data.type === 'peer_disconnected') {
                if (peerConnection) peerConnection.close();
                remoteVideo.srcObject = null;
                statusText.innerText = "الطرف الآخر غادر.";
            }
        };

        function processIceQueue() {
            while (iceCandidateQueue.length > 0) {
                peerConnection.addIceCandidate(new RTCIceCandidate(iceCandidateQueue.shift()));
            }
        }

        function createPeerConnection() {
            peerConnection = new RTCPeerConnection(config);
            localStream.getTracks().forEach(track => peerConnection.addTrack(track, localStream));
            
            peerConnection.ontrack = (event) => {
                if (remoteVideo.srcObject !== event.streams[0]) {
                    remoteVideo.srcObject = event.streams[0];
                    remoteVideo.play().catch(() => {});
                }
            };

            peerConnection.onicecandidate = (event) => {
                if (event.candidate) ws.send(JSON.stringify({ type: 'ice-candidate', candidate: event.candidate }));
            };

            peerConnection.oniceconnectionstatechange = () => {
                if(peerConnection.iceConnectionState === 'connected') statusText.innerText = "متصل الآن! ✅";
            };
        }

        function sendMessage() {
            const text = chatInput.value.trim();
            if (text !== '') {
                appendMessage(text, 'local');
                ws.send(JSON.stringify({ type: 'chat', text: text }));
                chatInput.value = '';
            }
        }

        function appendMessage(text, sender) {
            const msgDiv = document.createElement('div');
            msgDiv.classList.add('msg', sender);
            msgDiv.innerText = text;
            chatMessages.appendChild(msgDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function stopEverything() {
            if (localStream) localStream.getTracks().forEach(t => t.stop());
            ws.close();
            statusText.innerText = "تم الإيقاف.";
        }
    </script>
</body>
</html>
